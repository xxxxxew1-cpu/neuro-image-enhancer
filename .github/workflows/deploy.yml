name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Don't download the Playwright browser during `npm ci` (only needed for the
    # local e2e test, not for building/deploying).
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Auto-enables GitHub Pages (build type = GitHub Actions) on first run,
      # so no manual toggling in Settings → Pages is needed.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - run: npm ci
      - run: npm run build
      - run: node scripts/check-size.mjs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
